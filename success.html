<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Successful</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #e8f5e9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .success-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
    }

    h1 {
      color: #28a745;
    }

    p {
      margin-top: 10px;
      font-size: 18px;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      text-decoration: none;
      background: #007bff;
      color: white;
      padding: 10px 20px;
      border-radius: 5px;
    }

    a:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <div class="success-box">
    <h1>Congratulations!</h1>
    <p>You have successfully logged in.</p>

    <a href="index.html">Back to Login</a>
  </div>

</body>
</html>
